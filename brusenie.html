<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brúsenie korčúľ 🏒</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏒</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(170deg, #0b1a30 0%, #0f2447 50%, #162d54 100%); min-height: 100vh; color: #d0daea; }
input::placeholder { color: #5a7ab5; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

.container { max-width: 460px; margin: 0 auto; padding: 0 14px 50px; }
.header { text-align: center; padding: 24px 0 14px; }
.header-top { display: flex; align-items: center; justify-content: center; gap: 8px; }
.header-icon { font-size: 28px; }
.header-title { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.header-sub { font-size: 12px; color: #5a7ab5; margin-top: 4px; }
.refresh-btn { cursor: pointer; font-size: 14px; color: #5a7ab5; }
.error-msg { font-size: 11px; color: #ffa94d; margin-top: 6px; font-style: italic; background: rgba(255,169,77,0.1); padding: 8px 12px; border-radius: 8px; display: inline-block; }

.summary-card { background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%); border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06); }
.summary-date { font-size: 11px; color: #5a7ab5; text-align: center; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
.summary-row { display: flex; justify-content: space-around; align-items: center; }
.summary-item { text-align: center; flex: 1; }
.summary-num { font-size: 22px; font-weight: 700; color: #fff; }
.summary-label { font-size: 10px; color: #5a7ab5; margin-top: 2px; letter-spacing: 0.5px; }
.summary-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.08); }
.color-red { color: #ff6b6b; }
.color-green { color: #51cf66; }

.add-btn { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: #fff; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 14px; box-shadow: 0 6px 20px rgba(37,99,235,0.3); display: flex; align-items: center; justify-content: center; font-family: inherit; }
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
.add-btn-icon { font-size: 22px; margin-right: 8px; }

.picker { background: rgba(255,255,255,0.04); border-radius: 16px; overflow: hidden; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06); animation: fadeIn 0.2s ease; }
.picker-header { display: flex; align-items: center; padding: 10px; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.search-input { flex: 1; padding: 11px 14px; font-size: 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; outline: none; font-family: inherit; }
.cancel-btn { background: rgba(255,255,255,0.08); border: none; color: #8899bb; font-size: 17px; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.player-list { max-height: 360px; overflow-y: auto; }
.player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e0e8f5; }
.player-pos { font-size: 11px; color: #5a7ab5; margin-top: 1px; }
.player-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.pair-btn { width: 34px; height: 34px; border-radius: 9px; background: rgba(255,255,255,0.08); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.pair-count { width: 22px; text-align: center; font-size: 16px; font-weight: 700; color: #fff; }
.confirm-btn { padding: 7px 14px; border-radius: 9px; background: linear-gradient(135deg, #16a34a, #15803d); border: none; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-left: 4px; white-space: nowrap; box-shadow: 0 2px 8px rgba(22,163,74,0.3); font-family: inherit; }
.no-results { padding: 24px; text-align: center; color: #5a7ab5; font-size: 14px; }
.loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #5a7ab5; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }

.section { margin-bottom: 12px; }
.section-title { font-size: 11px; font-weight: 700; color: #5a7ab5; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; padding-left: 2px; display: flex; justify-content: space-between; }
.section-sum { color: #7b9fd4; font-weight: 600; }

.record-card { display: flex; align-items: center; background: rgba(255,255,255,0.04); border-radius: 11px; margin-bottom: 5px; overflow: hidden; }
.record-card.paid { border-left: 3px solid #51cf66; opacity: 0.65; }
.record-card.unpaid-card { border-left: 3px solid #ff6b6b; }
.record-main { display: flex; align-items: center; flex: 1; padding: 11px; cursor: pointer; gap: 9px; min-width: 0; }
.record-check { font-size: 17px; flex-shrink: 0; }
.record-info { flex: 1; min-width: 0; }
.record-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e0e8f5; }
.record-meta { font-size: 11px; color: #5a7ab5; margin-top: 1px; }
.record-amount { font-size: 16px; font-weight: 700; flex-shrink: 0; color: #fff; }
.delete-btn { background: none; border: none; font-size: 15px; padding: 0 11px; cursor: pointer; opacity: 0.35; }
.delete-confirm { display: flex; align-items: center; gap: 5px; padding: 0 8px; flex-shrink: 0; }
.delete-yes { background: #dc2626; border: none; color: #fff; border-radius: 7px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.delete-no { background: rgba(255,255,255,0.08); border: none; color: #8899bb; border-radius: 7px; padding: 5px 8px; font-size: 12px; cursor: pointer; font-family: inherit; }

.history-btn { width: 100%; padding: 11px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.04); color: #5a7ab5; border: 1px solid rgba(255,255,255,0.06); border-radius: 11px; cursor: pointer; margin-bottom: 14px; font-family: inherit; }
.reset-btn { width: 100%; padding: 10px; font-size: 12px; background: none; color: #3a4a66; border: none; cursor: pointer; margin-top: 24px; font-family: inherit; }

.hidden { display: none; }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <div class="header-top">
      <span class="header-icon">🏒</span>
      <span class="header-title">Brúsenie</span>
    </div>
    <div class="header-sub" id="headerSub">2 € / pár · <span class="loading-spinner"></span>načítavam...</div>
    <div class="hidden" id="errorMsg"></div>
  </div>

  <div class="summary-card">
    <div class="summary-date" id="summaryDate"></div>
    <div class="summary-row">
      <div class="summary-item">
        <div class="summary-num" id="sumCount">0</div>
        <div class="summary-label">zápisov</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-num" id="sumTotal">0 €</div>
        <div class="summary-label">celkom</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-num" id="sumUnpaid">0 €</div>
        <div class="summary-label">nezaplat.</div>
      </div>
    </div>
  </div>

  <button class="add-btn" id="addBtn" onclick="showPicker()" disabled>
    <span class="add-btn-icon">+</span> Pridať brúsenie
  </button>

  <div class="picker hidden" id="picker">
    <div class="picker-header">
      <input type="text" class="search-input" id="searchInput" placeholder="Hľadať hráča..." oninput="filterPlayers()">
      <button class="cancel-btn" onclick="hidePicker()">✕</button>
    </div>
    <div class="player-list" id="playerList"></div>
  </div>

  <div id="todaySection" class="hidden">
    <div class="section-title"><span>Dnes</span></div>
    <div id="todayRecords"></div>
  </div>

  <button class="history-btn hidden" id="historyBtn" onclick="toggleHistory()"></button>
  <div id="historySection" class="hidden"></div>
  <button class="reset-btn hidden" id="resetBtn" onclick="resetAll()">Vymazať všetko</button>
</div>

<script>
// ==========================================
// CONFIG
// ==========================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxngkl1Co6ul8racAGGJnx4JZbJRyJ6IwyNwni2ufODjOhCdokCQro9ACCEgg70Bc2N/exec";
const API_KEY = "brusenie2025";
const PRICE = 2;

// ==========================================
// STATE
// ==========================================
let players = [];
let playerSource = "";
let records = [];
let showingHistory = false;
let confirmDeleteId = null;
let pairCounts = {};

// ==========================================
// HELPERS
// ==========================================
function formatDate(d) {
  return String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0") + "." + d.getFullYear();
}
function formatTime(d) {
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function todayStr() { return formatDate(new Date()); }
function $(id) { return document.getElementById(id); }

// ==========================================
// STORAGE
// ==========================================
function loadRecords() {
  try {
    const data = localStorage.getItem("brusenie-records");
    if (data) records = JSON.parse(data);
  } catch(e) {}
}
function saveRecords() {
  try {
    localStorage.setItem("brusenie-records", JSON.stringify(records));
  } catch(e) { console.error("Save failed:", e); }
}

// Cache hráčov pre offline použitie
function saveCachedPlayers(playerList) {
  try {
    localStorage.setItem("brusenie-players-cache", JSON.stringify({
      players: playerList,
      timestamp: new Date().toISOString()
    }));
  } catch(e) {}
}

function loadCachedPlayers() {
  try {
    const data = localStorage.getItem("brusenie-players-cache");
    if (data) {
      const parsed = JSON.parse(data);
      if (parsed.players && parsed.players.length > 0) {
        return parsed;
      }
    }
  } catch(e) {}
  return null;
}

// ==========================================
// LOAD PLAYERS FROM NOTION (with cache)
// ==========================================
async function loadPlayers() {
  $("headerSub").innerHTML = PRICE + ' € / pár · <span class="loading-spinner"></span>načítavam...';
  
  // Najprv skús načítať z cache (aby bol zoznam hneď k dispozícii)
  const cache = loadCachedPlayers();
  if (cache) {
    players = cache.players;
    playerSource = "cache";
    const cacheDate = new Date(cache.timestamp);
    const cacheInfo = formatDate(cacheDate) + " " + formatTime(cacheDate);
    $("headerSub").innerHTML = PRICE + ' € / pár · <span style="color:#ffa94d">●</span> cache (' + players.length + ', ' + cacheInfo + ') <span class="refresh-btn" onclick="loadPlayers()">↻</span>';
    $("addBtn").disabled = false;
    $("errorMsg").classList.add("hidden");
  }
  
  // Potom skús aktualizovať z Notion
  try {
    const url = APPS_SCRIPT_URL + "?action=getPlayers&apiKey=" + API_KEY;
    const res = await fetch(url);
    const data = await res.json();
    if (data.success && data.players && data.players.length > 0) {
      players = data.players;
      playerSource = "notion";
      saveCachedPlayers(players); // Ulož do cache pre offline
      $("headerSub").innerHTML = PRICE + ' € / pár · <span style="color:#51cf66">●</span> Notion (' + players.length + ') <span class="refresh-btn" onclick="loadPlayers()">↻</span>';
      $("addBtn").disabled = false;
      $("errorMsg").classList.add("hidden");
    } else if (!cache) {
      // Žiadny cache, žiadne dáta z Notion
      showError(data.error || "Notion vrátil prázdny zoznam. Pripoj sa na internet pre prvé načítanie.");
    }
    // Ak máme cache ale Notion zlyhal, necháme cache (už nastavené vyššie)
  } catch(e) {
    if (!cache) {
      showError("Žiadne pripojenie a žiadni uložení hráči. Pripoj sa na internet pre prvé načítanie.");
    }
    // Ak máme cache, necháme ho — už je nastavený
  }
}

function showError(msg) {
  players = [];
  playerSource = "offline";
  $("headerSub").innerHTML = PRICE + ' € / pár · <span style="color:#ff6b6b">●</span> offline <span class="refresh-btn" onclick="loadPlayers()">↻</span>';
  $("errorMsg").innerHTML = '<div class="error-msg">' + escapeHtml(msg) + '</div>';
  $("errorMsg").classList.remove("hidden");
  $("addBtn").disabled = true;
}

// ==========================================
// RENDER
// ==========================================
function render() {
  const today = todayStr();
  $("summaryDate").textContent = today;

  const todayRecs = records.filter(r => formatDate(new Date(r.date)) === today);
  const total = todayRecs.reduce((s,r) => s + r.amount, 0);
  const paid = todayRecs.filter(r => r.paid).reduce((s,r) => s + r.amount, 0);
  const unpaid = total - paid;

  $("sumCount").textContent = todayRecs.length;
  $("sumTotal").textContent = total + " €";
  $("sumUnpaid").textContent = unpaid + " €";
  $("sumUnpaid").className = "summary-num " + (unpaid > 0 ? "color-red" : "color-green");

  if (todayRecs.length > 0) {
    $("todaySection").classList.remove("hidden");
    $("todayRecords").innerHTML = todayRecs.map(r => renderRecord(r)).join("");
  } else {
    $("todaySection").classList.add("hidden");
  }

  const historyCount = records.length - todayRecs.length;
  if (historyCount > 0) {
    $("historyBtn").classList.remove("hidden");
    $("historyBtn").textContent = (showingHistory ? "Skryť" : "História") + " (" + historyCount + ")";
  } else {
    $("historyBtn").classList.add("hidden");
  }

  if (showingHistory && historyCount > 0) {
    const grouped = {};
    records.forEach(r => {
      const key = formatDate(new Date(r.date));
      if (key !== today) {
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(r);
      }
    });
    let html = "";
    Object.keys(grouped).forEach(dateKey => {
      const dateTotal = grouped[dateKey].reduce((s,r) => s + r.amount, 0);
      html += '<div class="section"><div class="section-title"><span>' + dateKey + '</span><span class="section-sum">' + dateTotal + ' €</span></div>';
      html += grouped[dateKey].map(r => renderRecord(r)).join("");
      html += '</div>';
    });
    $("historySection").innerHTML = html;
    $("historySection").classList.remove("hidden");
  } else {
    $("historySection").classList.add("hidden");
  }

  if (records.length > 0) {
    $("resetBtn").classList.remove("hidden");
  } else {
    $("resetBtn").classList.add("hidden");
  }
}

function renderRecord(r) {
  const time = formatTime(new Date(r.date));
  const paidClass = r.paid ? "paid" : "unpaid-card";
  const check = r.paid ? "✅" : "⬜";
  const pairText = r.pairs + " pár" + (r.pairs > 1 ? "y" : "");
  const isConfirm = confirmDeleteId === r.id;

  let deleteHtml;
  if (isConfirm) {
    deleteHtml = '<div class="delete-confirm"><button class="delete-yes" onclick="deleteRecord(' + r.id + ')">Zmazať</button><button class="delete-no" onclick="cancelDelete()">✕</button></div>';
  } else {
    deleteHtml = '<button class="delete-btn" onclick="askDelete(' + r.id + ')">🗑</button>';
  }

  return '<div class="record-card ' + paidClass + '">' +
    '<div class="record-main" onclick="togglePaid(' + r.id + ')">' +
      '<div class="record-check">' + check + '</div>' +
      '<div class="record-info"><div class="record-name">' + escapeHtml(r.name) + '</div><div class="record-meta">' + pairText + ' · ' + time + '</div></div>' +
      '<div class="record-amount">' + r.amount + ' €</div>' +
    '</div>' +
    deleteHtml +
  '</div>';
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// ==========================================
// PLAYER PICKER
// ==========================================
function showPicker() {
  if (players.length === 0) return;
  $("picker").classList.remove("hidden");
  $("addBtn").classList.add("hidden");
  $("searchInput").value = "";
  pairCounts = {};
  renderPlayerList(players);
  setTimeout(() => $("searchInput").focus(), 100);
}

function hidePicker() {
  $("picker").classList.add("hidden");
  $("addBtn").classList.remove("hidden");
}

function filterPlayers() {
  const q = $("searchInput").value.toLowerCase();
  const filtered = players.filter(p => p.name.toLowerCase().includes(q));
  renderPlayerList(filtered);
}

function renderPlayerList(list) {
  if (list.length === 0) {
    $("playerList").innerHTML = '<div class="no-results">Žiadny hráč</div>';
    return;
  }
  $("playerList").innerHTML = list.map(p => {
    const pairs = pairCounts[p.name] || 1;
    const posIcon = p.position === "Brankár" ? "🥅" : p.position === "Obranca" ? "🛡" : p.position ? "⚡" : "";
    const posText = p.position ? '<div class="player-pos">' + posIcon + ' ' + escapeHtml(p.position) + (p.jersey ? ' · #' + p.jersey : '') + '</div>' : '';

    return '<div class="player-row">' +
      '<div class="player-info"><div class="player-name">' + escapeHtml(p.name) + '</div>' + posText + '</div>' +
      '<div class="player-actions">' +
        '<button class="pair-btn" onclick="changePairs(\'' + escapeAttr(p.name) + '\',-1)">−</button>' +
        '<span class="pair-count" id="pc-' + escapeAttr(p.name) + '">' + pairs + '</span>' +
        '<button class="pair-btn" onclick="changePairs(\'' + escapeAttr(p.name) + '\',1)">+</button>' +
        '<button class="confirm-btn" onclick="addRecord(\'' + escapeAttr(p.name) + '\')" id="cb-' + escapeAttr(p.name) + '">' + (pairs * PRICE) + '€ ✓</button>' +
      '</div></div>';
  }).join("");
}

function escapeAttr(s) {
  return s.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function changePairs(name, delta) {
  const current = pairCounts[name] || 1;
  const newVal = Math.max(1, current + delta);
  pairCounts[name] = newVal;

  const countEl = document.getElementById("pc-" + name);
  const btnEl = document.getElementById("cb-" + name);
  if (countEl) countEl.textContent = newVal;
  if (btnEl) btnEl.textContent = (newVal * PRICE) + "€ ✓";
}

// ==========================================
// RECORD ACTIONS
// ==========================================
function addRecord(name) {
  const pairs = pairCounts[name] || 1;
  const now = new Date();
  records.unshift({
    id: Date.now(),
    name: name,
    pairs: pairs,
    amount: pairs * PRICE,
    date: now.toISOString(),
    paid: false
  });
  saveRecords();
  hidePicker();
  render();
}

function togglePaid(id) {
  const r = records.find(r => r.id === id);
  if (r) r.paid = !r.paid;
  confirmDeleteId = null;
  saveRecords();
  render();
}

function askDelete(id) {
  confirmDeleteId = id;
  render();
}

function cancelDelete() {
  confirmDeleteId = null;
  render();
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  confirmDeleteId = null;
  saveRecords();
  render();
}

function toggleHistory() {
  showingHistory = !showingHistory;
  render();
}

function resetAll() {
  if (confirm("Vymazať všetky záznamy?")) {
    records = [];
    saveRecords();
    render();
  }
}

// ==========================================
// INIT
// ==========================================
loadRecords();
render();
loadPlayers();
</script>
</body>
</html>
